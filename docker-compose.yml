version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sistemboq-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - sistemboq-network

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sistemboq-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_sistem_boq
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: sistemboq
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      # Uncomment the next line if you want to seed the database initially from the SQL file
      # - ./db_sistem_boq.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sistemboq-network

networks:
  sistemboq-network:
    driver: bridge

volumes:
  dbdata:
